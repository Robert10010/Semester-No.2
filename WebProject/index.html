<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Phone Interface</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="phone-container">
        <!-- 顯示螢幕 -->
        <div class="screen">
            <div id="display" class="display-text"></div>
            <div id="status" class="status-indicator">Ready</div>
        </div>

        <!-- 數字撥號區 -->
        <div class="keypad">
            <button class="key num-key" data-val="1">1</button>
            <button class="key num-key" data-val="2">2<span>ABC</span></button>
            <button class="key num-key" data-val="3">3<span>DEF</span></button>

            <button class="key num-key" data-val="4">4<span>GHI</span></button>
            <button class="key num-key" data-val="5">5<span>JKL</span></button>
            <button class="key num-key" data-val="6">6<span>MNO</span></button>

            <button class="key num-key" data-val="7">7<span>PQRS</span></button>
            <button class="key num-key" data-val="8">8<span>TUV</span></button>
            <button class="key num-key" data-val="9">9<span>WXYZ</span></button>

            <button class="key num-key" data-val="*">*</button>
            <button class="key num-key" data-val="0">0<span>+</span></button>
            <button class="key num-key" data-val="#">#</button>
        </div>

        <!-- 控制區 -->
        <div class="controls">
            <button id="btn-clear" class="btn btn-clear">Clear</button>
            <button id="btn-call" class="btn btn-call">Call</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
